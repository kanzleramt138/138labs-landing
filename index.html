<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>138Labs</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #05060d;
      --panel: #0b0d18;
      --text: #f5f7fb;
      --muted: #b8becd;
      --line: #24283a;
      --green: #42e59b;
      --violet: #7c4dff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(145deg, rgba(66, 229, 155, 0.1), transparent 30%),
        linear-gradient(315deg, rgba(124, 77, 255, 0.14), transparent 34%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    main {
      min-height: 100vh;
    }
    .hero {
      min-height: 100vh;
      display: grid;
      align-content: center;
      gap: clamp(28px, 5vw, 56px);
      overflow: hidden;
      padding: clamp(24px, 5vw, 56px);
      position: relative;
    }
    .hero-logo {
      width: min(100%, 980px);
      height: auto;
      display: block;
      justify-self: center;
    }
    .content {
      width: min(100%, 980px);
      display: grid;
      gap: 22px;
      justify-self: center;
      position: relative;
      z-index: 1;
    }
    .tag {
      color: var(--green);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(38px, 8vw, 88px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: 0;
    }
    p {
      max-width: 650px;
      font-size: clamp(18px, 2.4vw, 22px);
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--text);
      background: rgba(11, 13, 24, 0.78);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }
    .links a:nth-child(1):hover,
    .links a:nth-child(1):focus-visible {
      border-color: var(--green);
    }
    .links a:nth-child(2):hover,
    .links a:nth-child(2):focus-visible {
      border-color: var(--violet);
    }
    .links a:nth-child(3):hover,
    .links a:nth-child(3):focus-visible {
      border-color: var(--green);
    }
    .links a:hover,
    .links a:focus-visible {
      background: rgba(18, 21, 38, 0.92);
      transform: translateY(-1px);
      outline: none;
    }
    .links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex: 0 0 auto;
    }
    .legal {
      position: fixed;
      right: clamp(16px, 3vw, 32px);
      bottom: clamp(16px, 3vw, 32px);
      z-index: 2;
    }
    .legal a {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: color 160ms ease;
    }
    .legal a:hover,
    .legal a:focus-visible {
      color: var(--green);
      outline: none;
    }
    @media (max-width: 620px) {
      .hero {
        align-content: center;
        padding: 20px;
      }
      .hero-logo {
        width: min(112vw, 720px);
        max-width: none;
      }
      .content {
        gap: 20px;
      }
      .links {
        width: 100%;
      }
      .links a {
        flex: 1 1 140px;
        justify-content: center;
      }
      .legal {
        position: static;
        padding: 0 20px 20px;
      }
    }
  </style>
</head>

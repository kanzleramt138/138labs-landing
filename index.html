<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>138Labs</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #05060d;
      --panel: #0b0d18;
      --text: #f5f7fb;
      --muted: #b8becd;
      --line: #24283a;
      --green: #42e59b;
      --violet: #7c4dff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(145deg, rgba(66, 229, 155, 0.1), transparent 30%),
        linear-gradient(315deg, rgba(124, 77, 255, 0.14), transparent 34%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(100%, 980px);
      padding: clamp(32px, 7vw, 80px) 24px;
    }
    .brand {
      display: grid;
      gap: 28px;
      justify-items: start;
    }
    .logo {
      width: min(100%, 560px);
      height: auto;
      display: block;
      border-radius: 18px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
    }
    .tag {
      color: var(--green);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(38px, 8vw, 88px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: 0;
    }
    p {
      max-width: 650px;
      font-size: clamp(18px, 2.4vw, 22px);
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--text);
      background: rgba(11, 13, 24, 0.78);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }
    .links a:first-child:hover,
    .links a:first-child:focus-visible {
      border-color: var(--green);
    }
    .links a:last-child:hover,
    .links a:last-child:focus-visible {
      border-color: var(--violet);
    }
    .links a:hover,
    .links a:focus-visible {
      background: rgba(18, 21, 38, 0.92);
      transform: translateY(-1px);
      outline: none;
    }
    .links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex: 0 0 auto;
    }
    @media (max-width: 620px) {
      main {
        padding-inline: 20px;
      }
      .brand {
        gap: 22px;
      }
      .logo {
        border-radius: 12px;
      }
      .links {
        width: 100%;
      }
      .links a {
        flex: 1 1 140px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="brand" aria-label="138Labs">
      <img class="logo" src="logo.png" alt="138Labs logo" width="1254" height="1254" />
      <div class="tag">Software / AI / Automation</div>
      <h1>Practical systems with a neon edge.</h1>
      <p>
        Building software experiments, automation workflows and AI-powered tools with the directness of the 138Labs mark.
      </p>
      <nav class="links" aria-label="Social links">
        <a href="https://github.com/kanzleramt138" target="_blank" rel="noopener noreferrer">

      </nav>
    </section>
  </main>
</body>
</html>

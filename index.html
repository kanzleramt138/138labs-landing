<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>138Labs</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #05060d;
      --panel: #0b0d18;
      --text: #f5f7fb;
      --muted: #b8becd;
      --line: #24283a;
      --green: #42e59b;
      --violet: #7c4dff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(145deg, rgba(66, 229, 155, 0.1), transparent 30%),
        linear-gradient(315deg, rgba(124, 77, 255, 0.14), transparent 34%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .hero {
      min-height: 100svh;
      display: grid;
      align-content: center;
      gap: clamp(28px, 5vw, 56px);
      overflow: hidden;
      padding: clamp(24px, 5vw, 56px);
      position: relative;
    }
    picture {
      width: 100%;
      max-width: 924px;
      justify-self: center;
      animation: logo-breathe 8s ease-in-out infinite, startup-flicker 1.15s ease-out both;
      position: relative;
    }
    picture::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("logo-glow-green.png") center / contain no-repeat;
      filter: blur(10px);
      opacity: 0.5;
      pointer-events: none;
      z-index: -1;
      animation: logo-aura 8s ease-in-out infinite;
    }
    picture::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url("logo-glow-violet.png") center / contain no-repeat;
      filter: blur(10px);
      opacity: 0.54;
      pointer-events: none;
      z-index: -1;
      animation: logo-aura 8s ease-in-out infinite reverse;
    }
    .hero-logo {
      width: 100%;
      height: auto;
      display: block;
      position: relative;
      z-index: 1;
    }
    .content {
      width: min(100%, 980px);
      display: grid;
      gap: 22px;
      justify-self: center;
      position: relative;
      z-index: 1;
    }
    .tag {
      color: var(--green);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      font-size: 88px;
      line-height: 0.95;
      margin: 0;
      letter-spacing: 0;
    }
    .neon-word {
      border-radius: 6px;
      color: rgba(245, 247, 251, 0.92);
      display: inline-block;
      position: relative;
      isolation: isolate;
      animation: neon-flicker 4.8s infinite;
      -webkit-text-stroke: 1.5px rgba(66, 229, 155, 0.78);
      paint-order: stroke fill;
      transition: color 180ms ease, filter 180ms ease, opacity 180ms ease, text-shadow 180ms ease, transform 180ms ease;
    }
    .neon-word::before,
    .neon-word::after {
      content: "neon";
      inset: 0;
      pointer-events: none;
      position: absolute;
      z-index: -1;
    }
    .neon-word::before {
      color: transparent;
      -webkit-text-stroke: 2px rgba(66, 229, 155, 0.36);
      filter: blur(1px);
    }
    .neon-word::after {
      color: rgba(66, 229, 155, 0.5);
      filter: blur(8px);
      opacity: 0.48;
    }
    .neon-word:hover,
    .neon-word:focus-visible {
      animation: none;
      color: #f7fff9;
      filter: saturate(1.2);
      opacity: 1;
      outline: none;
      -webkit-text-stroke-color: rgba(66, 229, 155, 0.98);
      text-shadow:
        0 0 3px rgba(255, 255, 255, 0.68),
        0 0 9px rgba(66, 229, 155, 0.7),
        0 0 22px rgba(66, 229, 155, 0.44),
        0 0 38px rgba(66, 229, 155, 0.22);
      transform: translateY(-1px);
    }
    .neon-word:hover::before,
    .neon-word:focus-visible::before {
      -webkit-text-stroke-color: rgba(66, 229, 155, 0.48);
      filter: blur(1px);
    }
    .neon-word:hover::after,
    .neon-word:focus-visible::after {
      opacity: 0.62;
      filter: blur(10px);
    }
    @keyframes neon-flicker {
      0%,
      10%,
      12%,
      19%,
      21%,
      53%,
      55%,
      100% {
        color: #ecfff6;
        filter: saturate(1.08);
        opacity: 1;
        -webkit-text-stroke-color: rgba(66, 229, 155, 0.86);
        text-shadow:
          0 0 3px rgba(255, 255, 255, 0.5),
          0 0 8px rgba(66, 229, 155, 0.52),
          0 0 18px rgba(66, 229, 155, 0.26);
      }
      11%,
      20%,
      54% {
        color: rgba(236, 255, 246, 0.82);
        filter: saturate(0.95);
        opacity: 0.86;
        -webkit-text-stroke-color: rgba(66, 229, 155, 0.52);
        text-shadow:
          0 0 4px rgba(66, 229, 155, 0.28),
          0 0 10px rgba(66, 229, 155, 0.12);
      }
      63% {
        color: #dffff0;
        filter: saturate(1);
        opacity: 0.88;
        -webkit-text-stroke-color: rgba(66, 229, 155, 0.62);
        text-shadow:
          0 0 6px rgba(66, 229, 155, 0.42),
          0 0 14px rgba(66, 229, 155, 0.18);
      }
      64% {
        color: rgba(236, 255, 246, 0.78);
        filter: saturate(0.9);
        opacity: 0.82;
        -webkit-text-stroke-color: rgba(66, 229, 155, 0.46);
        text-shadow: 0 0 5px rgba(66, 229, 155, 0.18);
      }
    }
    p {
      max-width: 650px;
      font-size: 22px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
    }
    .intro {
      width: fit-content;
      max-width: min(100%, 720px);
      margin: 8px 0 12px;
      padding: 12px 0 12px 18px;
      border-left: 1px solid rgba(66, 229, 155, 0.36);
      color: #d5dbea;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 17px;
      line-height: 1.7;
    }
    .intro::before {
      content: "> ";
      color: var(--green);
      font-weight: 700;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--text);
      background: rgba(11, 13, 24, 0.78);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      transition: border-color 160ms ease, box-shadow 160ms ease, color 160ms ease, background 160ms ease, transform 160ms ease;
    }
    .links a:nth-child(1):hover,
    .links a:nth-child(1):focus-visible {
      border-color: var(--green);
      box-shadow:
        0 0 0 1px rgba(66, 229, 155, 0.18),
        0 0 20px rgba(66, 229, 155, 0.28);
    }
    .links a:nth-child(2):hover,
    .links a:nth-child(2):focus-visible {
      border-color: var(--violet);
      box-shadow:
        0 0 0 1px rgba(124, 77, 255, 0.18),
        0 0 20px rgba(124, 77, 255, 0.32);
    }
    .links a:nth-child(3):hover,
    .links a:nth-child(3):focus-visible {
      border-color: var(--green);
      box-shadow:
        0 0 0 1px rgba(66, 229, 155, 0.18),
        0 0 20px rgba(66, 229, 155, 0.28);
    }
    .links a:hover,
    .links a:focus-visible {
      background: rgba(18, 21, 38, 0.92);
      color: #ffffff;
      transform: translateY(-1px);
      outline: none;
    }
    .links a:hover svg,
    .links a:focus-visible svg {
      filter: drop-shadow(0 0 8px currentColor);
    }
    .links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex: 0 0 auto;
    }
    .legal {
      position: fixed;
      right: clamp(16px, 3vw, 32px);
      bottom: clamp(16px, 3vw, 32px);
      z-index: 2;
    }
    .legal a {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: color 160ms ease;
    }
    .legal a:hover,
    .legal a:focus-visible {
      color: var(--green);
      outline: none;
    }
    @keyframes logo-breathe {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-2px) scale(1.006);
      }
    }
    @keyframes logo-aura {
      0%,
      100% {
        opacity: 0.42;
        transform: scale(0.985);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.025);
      }
    }
    @keyframes startup-flicker {
      0% {
        opacity: 0.15;
        filter: brightness(0.6) saturate(0.6);
      }
      9% {
        opacity: 1;
        filter: brightness(1.35) saturate(1.2);
      }
      15% {
        opacity: 0.38;
        filter: brightness(0.7) saturate(0.7);
      }
      24%,
      31% {
        opacity: 1;
        filter: brightness(1.22) saturate(1.15);
      }
      27% {
        opacity: 0.52;
        filter: brightness(0.75) saturate(0.8);
      }
      100% {
        opacity: 1;
      }
    }
    @media (max-width: 1080px) {
      .hero-logo,
      picture,
      .content {
        max-width: 860px;
      }
      h1 {
        font-size: 74px;
      }
    }
    @media (max-width: 860px) {
      .hero {
        gap: 40px;
      }
      .hero-logo,
      picture,
      .content {
        max-width: 680px;
      }
      h1 {
        font-size: 60px;
      }
      p {
        font-size: 20px;
      }
    }
    @media (max-width: 620px) {
      .hero {
        align-content: start;
        gap: 26px;
        min-height: auto;
        padding: 34px 20px 28px;
      }
      picture {
        max-width: 460px;
        justify-self: center;
      }
      .content {
        gap: 18px;
        width: 100%;
      }
      .tag {
        font-size: 12px;
        letter-spacing: 0.12em;
      }
      h1 {
        font-size: 52px;
        line-height: 0.98;
      }
      p {
        font-size: 17px;
        line-height: 1.5;
      }
      .intro {
        margin: 4px 0 10px;
        padding-left: 14px;
        font-size: 15px;
        line-height: 1.6;
      }
      .links {
        width: 100%;
        gap: 10px;
      }
      .links a {
        flex: 1 1 100%;
        justify-content: center;
      }
      .legal {
        position: static;
        padding: 0 20px 24px;
      }
    }
    @media (max-width: 380px) {
      .hero {
        padding-inline: 16px;
        gap: 22px;
      }
      picture {
        max-width: 340px;
      }
      h1 {
        font-size: 40px;
      }
      .links a {
        min-height: 42px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      picture {
        animation: none;
      }
      picture::before {
        animation: none;
      }
      picture::after {
        animation: none;
      }
      .neon-word {
        animation: none;
        color: var(--green);
        text-shadow: 0 0 12px rgba(66, 229, 155, 0.42);
      }
    }
  </style>
</head>
<body>

      <picture>
